plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "pdf_lagbe.gemspec"

Metrics/AbcSize:
  Exclude:
    - "lib/pdf_lagbe/connection.rb"

Metrics/MethodLength:
  Max: 20

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 3

RSpec/MultipleDescribes:
  Enabled: false

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/NestedGroups:
  Max: 4
